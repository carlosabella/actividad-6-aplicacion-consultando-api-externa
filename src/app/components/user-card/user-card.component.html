<article>
<figure>
  <img [src]="user()?.image">
</figure>
<section>
  <div>
    {{user()?.first_name}} {{user()?.last_name}}
  </div>
  <div [routerLink]="['/user', user()?._id]">
    Ver Detalle
  </div>
  <div [routerLink]="['/updateuser', user()?._id]">
    Actualizar
  </div>
  <div (click)="user()?._id && deleteUser(user()!._id!)">
    Borrar
  </div>
</section>
</article>

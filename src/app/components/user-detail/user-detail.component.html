<div class="container">
  <aside class="picture-side">
    <figure>
      <img [src]="user()?.image">
    </figure>
  </aside>
  <aside class="userdata-side">
    <div>
      {{user()?.first_name}}
    </div>
    <div>
      {{user()?.last_name}}
    </div>
    <div>
      Nombre de Usuario: {{user()?.username}}
    </div>
    <div>
      Email: {{user()?.email}}
    </div>
    <section class="options">
      <button class="btn-options" (click)="user()?._id && deleteUser(user()!._id!)">
        Eliminar
      </button>
      <button class="btn-options" [routerLink]="['/updateuser', user()?._id]">
        Actualizar
      </button>
      <button class="btn-options" [routerLink]="['/home']">
        Volver al listado
      </button>
    </section>
  </aside>
</div>

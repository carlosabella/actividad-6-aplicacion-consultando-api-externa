<header>
  NUEVO USUARIO
</header>
<section>
  <form [formGroup]="userForm" (ngSubmit)="manageUser()">
    <div class="fields">
      <label for="nombre" >Nombre Usuario</label>
      <input type="text"  id="nombre" placeholder="Introduzca nombre de usuario" formControlName="nombre">
    </div>
    <div class="fields">
      <label for="apellido" >Apellido Usuario</label>
      <input type="text"  id="apellido" placeholder="Introduzca apellido de usuario" formControlName="apellido">
    </div>
    <div class="fields">
      <label for="email" >Email Usuario</label>
      <input type="text"  id="email" placeholder="Introduzca email de usuario" formControlName="email">
    </div>
    <div class="fields">
      <label for="imagen" >Imagen Usuario</label>
      <input type="text"  id="imagen" placeholder="Introduzca imagen de usuario" formControlName="imagen">
    </div>
    <input type="submit" class="btn" [value]="newOrUpdate()" [disabled]="!userForm.valid">
  </form>
</section>
